name: CI

env:
  ASSEMBLY_NAME: analyze-assembly-size
  PROJECT_NAME: AssemblySizeAnalyzer
  PROJECT_FILE: src/AssemblySizeAnalyzer.csproj

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Setup .NET
      uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_FILE }}

    - name: Build
      run: dotnet build ${{ env.PROJECT_FILE }} -c Release --no-restore

    - name: Publish
      # With UseArtifactsOutput, output lands at artifacts/publish/<ProjectName>/release_<rid>/
      run: dotnet publish ${{ env.PROJECT_FILE }} -c Release -r ${{ matrix.rid }}

    - name: Upload artifacts
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
      with:
        name: ${{ env.ASSEMBLY_NAME }}-${{ matrix.rid }}
        path: artifacts/publish/${{ env.PROJECT_NAME }}/release_${{ matrix.rid }}/
